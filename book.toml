[book]
title = "What We Lost When The Web Won"
description = "Hypermedia and the early internet before the web flattened both. Xanadu, HyperCard, NLS, Gopher, Usenet, Plan 9 — what they were, why they lost, what their loss cost us, and what's being recovered."
authors = ["CloudStreet"]
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/cloudstreet-dev/What-We-Lost-When-The-Web-Won"

[output.html.search]
enable = true

[output.html.print]
enable = true

[output.html.fold]
enable = true
level = 1
